<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 Encoder/Decoder - FreeToolset</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="../index.html" class="navbar-brand">
      <span class="logo-icon">F</span>
      FreeToolset
    </a>
    <a href="../index.html" class="navbar-back">← All Tools</a>
  </nav>

  <main class="main-content">

    <div class="tool-header">
      <h1>🔄 Base64 Encoder / Decoder</h1>
      <p>Encode text to Base64 or decode Base64 back to readable text. Supports UTF-8 characters.</p>
    </div>

    <div class="tool-card-layout">

      <!-- Mode Toggle -->
      <div class="form-row">
        <label>Mode</label>
        <div class="btn-group">
          <button class="btn btn-primary" id="encodeModeBtn">Encode (Text → Base64)</button>
          <button class="btn btn-secondary" id="decodeModeBtn">Decode (Base64 → Text)</button>
        </div>
      </div>

      <!-- Input -->
      <div class="form-row">
        <label for="inputText" id="inputLabel">Input Text</label>
        <textarea id="inputText" placeholder="Enter text to encode..." style="min-height:140px;">Hello, World!</textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="processBtn">Encode</button>
        <button class="btn btn-secondary" id="swapBtn">⇅ Swap</button>
        <button class="btn btn-secondary" id="clearBtn">Clear</button>
        <button class="btn btn-secondary" id="copyBtn">Copy Result</button>
      </div>

      <!-- Output -->
      <div class="form-row" style="margin-top:20px;">
        <label>Result</label>
        <textarea id="outputText" readonly placeholder="Result will appear here..." style="min-height:140px;"></textarea>
      </div>

      <!-- Error message -->
      <div id="errorMsg" style="margin-top:8px; font-size:0.9rem; color:#dc2626; display:none;"></div>

    </div>
  </main>

  <footer class="footer">
    <p>FreeToolset — All tools run locally in your browser.</p>
  </footer>

  <script>
    (function () {
      var encodeModeBtn = document.getElementById('encodeModeBtn');
      var decodeModeBtn = document.getElementById('decodeModeBtn');
      var inputLabel = document.getElementById('inputLabel');
      var inputText = document.getElementById('inputText');
      var outputText = document.getElementById('outputText');
      var processBtn = document.getElementById('processBtn');
      var swapBtn = document.getElementById('swapBtn');
      var clearBtn = document.getElementById('clearBtn');
      var copyBtn = document.getElementById('copyBtn');
      var errorMsg = document.getElementById('errorMsg');

      var mode = 'encode'; // or 'decode'

      // Switch to encode mode
      function setEncodeMode() {
        mode = 'encode';
        encodeModeBtn.className = 'btn btn-primary';
        decodeModeBtn.className = 'btn btn-secondary';
        inputLabel.textContent = 'Input Text';
        inputText.placeholder = 'Enter text to encode...';
        processBtn.textContent = 'Encode';
        inputText.value = outputText.value || inputText.value;
        outputText.value = '';
        hideError();
      }

      // Switch to decode mode
      function setDecodeMode() {
        mode = 'decode';
        decodeModeBtn.className = 'btn btn-primary';
        encodeModeBtn.className = 'btn btn-secondary';
        inputLabel.textContent = 'Base64 Input';
        inputText.placeholder = 'Enter Base64 string to decode...';
        processBtn.textContent = 'Decode';
        inputText.value = outputText.value || inputText.value;
        outputText.value = '';
        hideError();
      }

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
      }

      function hideError() {
        errorMsg.style.display = 'none';
      }

      // Encode text to Base64 (UTF-8 safe)
      function encodeBase64(text) {
        // Handle UTF-8 characters properly
        var utf8 = unescape(encodeURIComponent(text));
        return btoa(utf8);
      }

      // Decode Base64 to text (UTF-8 safe)
      function decodeBase64(base64) {
        var utf8 = atob(base64);
        return decodeURIComponent(escape(utf8));
      }

      // Process (encode or decode)
      function process() {
        var input = inputText.value;
        hideError();

        if (!input) {
          showError('Please enter some text first.');
          return;
        }

        try {
          if (mode === 'encode') {
            outputText.value = encodeBase64(input);
          } else {
            // Clean input: remove whitespace/newlines
            var cleaned = input.replace(/\s/g, '');
            outputText.value = decodeBase64(cleaned);
          }
        } catch (e) {
          showError(mode === 'decode'
            ? 'Invalid Base64 string. Please check your input.'
            : 'Encoding error: ' + e.message);
        }
      }

      // Swap input and output
      function swap() {
        var temp = inputText.value;
        inputText.value = outputText.value;
        outputText.value = temp;
        hideError();
      }

      // Clear all
      function clear() {
        inputText.value = '';
        outputText.value = '';
        hideError();
      }

      // Copy result
      function copyResult() {
        if (!outputText.value) {
          showError('Nothing to copy yet.');
          return;
        }
        outputText.select();
        document.execCommand('copy');
        copyBtn.textContent = '✓ Copied!';
        setTimeout(function () {
          copyBtn.textContent = 'Copy Result';
        }, 1500);
      }

      // Event listeners
      encodeModeBtn.addEventListener('click', setEncodeMode);
      decodeModeBtn.addEventListener('click', setDecodeMode);
      processBtn.addEventListener('click', process);
      swapBtn.addEventListener('click', swap);
      clearBtn.addEventListener('click', clear);
      copyBtn.addEventListener('click', copyResult);

      // Process on input (live)
      inputText.addEventListener('input', function () {
        if (inputText.value) {
          process();
        } else {
          outputText.value = '';
          hideError();
        }
      });

      // Initial encode
      process();
    })();
  </script>

</body>
</html>
