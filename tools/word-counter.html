<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Counter - FreeToolset</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <span class="logo-icon">F</span>
      FreeToolset
    </a>
    <a href="index.html" class="navbar-back">← All Tools</a>
  </nav>

  <main class="main-content">

    <div class="tool-header">
      <h1>📝 Word Counter</h1>
      <p>Count words, characters, sentences, and paragraphs in real-time. Perfect for essays, articles, and social media posts.</p>
    </div>

    <div class="tool-card-layout">

      <!-- Text Input -->
      <div class="form-row">
        <label for="textInput">Your Text</label>
        <textarea id="textInput" placeholder="Start typing or paste your text here..." style="min-height:200px;"></textarea>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="wordCount">0</div>
          <div class="stat-label">Words</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="charCount">0</div>
          <div class="stat-label">Characters</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="charNoSpace">0</div>
          <div class="stat-label">No Spaces</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="sentenceCount">0</div>
          <div class="stat-label">Sentences</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="paragraphCount">0</div>
          <div class="stat-label">Paragraphs</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="readingTime">0</div>
          <div class="stat-label">Min Read</div>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-secondary" id="clearBtn">Clear Text</button>
        <button class="btn btn-secondary" id="copyBtn">Copy Text</button>
      </div>

    </div>
  </main>

  <footer class="footer">
    <p>FreeToolset — All tools run locally in your browser.</p>
  </footer>

  <script>
    (function () {
      var textInput = document.getElementById('textInput');
      var wordCount = document.getElementById('wordCount');
      var charCount = document.getElementById('charCount');
      var charNoSpace = document.getElementById('charNoSpace');
      var sentenceCount = document.getElementById('sentenceCount');
      var paragraphCount = document.getElementById('paragraphCount');
      var readingTime = document.getElementById('readingTime');
      var clearBtn = document.getElementById('clearBtn');
      var copyBtn = document.getElementById('copyBtn');

      // Count and update stats
      function updateStats() {
        var text = textInput.value;

        // Words: split by whitespace, filter empty
        var words = text.trim() ? text.trim().split(/\s+/) : [];
        wordCount.textContent = words.length;

        // Characters (with spaces)
        charCount.textContent = text.length;

        // Characters without spaces
        charNoSpace.textContent = text.replace(/\s/g, '').length;

        // Sentences: count sentence-ending punctuation
        var sentences = text.trim() ? text.split(/[.!?]+/).filter(function (s) {
          return s.trim().length > 0;
        }) : [];
        sentenceCount.textContent = sentences.length;

        // Paragraphs: split by double newlines
        var paragraphs = text.trim() ? text.split(/\n\s*\n/).filter(function (p) {
          return p.trim().length > 0;
        }) : [];
        // If there's text but no double newlines, count as 1 paragraph
        if (paragraphs.length === 0 && text.trim().length > 0) {
          paragraphs = text.split(/\n/).filter(function (p) {
            return p.trim().length > 0;
          });
        }
        paragraphCount.textContent = paragraphs.length;

        // Reading time: ~200 words per minute
        var minutes = words.length / 200;
        readingTime.textContent = minutes < 1 && words.length > 0
          ? '<1'
          : Math.ceil(minutes);
      }

      // Update on input
      textInput.addEventListener('input', updateStats);

      // Clear button
      clearBtn.addEventListener('click', function () {
        textInput.value = '';
        updateStats();
        textInput.focus();
      });

      // Copy button
      copyBtn.addEventListener('click', function () {
        if (!textInput.value) return;
        textInput.select();
        document.execCommand('copy');
        copyBtn.textContent = '✓ Copied!';
        setTimeout(function () {
          copyBtn.textContent = 'Copy Text';
        }, 1500);
      });

      // Initial update
      updateStats();
    })();
  </script>

</body>
</html>
