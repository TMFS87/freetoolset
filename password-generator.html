<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator - FreeToolset</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <span class="logo-icon">F</span>
      FreeToolset
    </a>
    <a href="index.html" class="navbar-back">← All Tools</a>
  </nav>

  <main class="main-content">

    <div class="tool-header">
      <h1>🔐 Password Generator</h1>
      <p>Generate strong, random passwords with customizable length and character sets.</p>
    </div>

    <div class="tool-card-layout">

      <!-- Password Display -->
      <div class="form-row">
        <label for="passwordOutput">Generated Password</label>
        <div style="display:flex; gap:10px;">
          <input type="text" id="passwordOutput" readonly style="font-family:'SF Mono',Monaco,monospace; font-size:1.1rem; flex:1;">
          <button class="btn btn-secondary" id="copyBtn" title="Copy to clipboard">Copy</button>
          <button class="btn btn-primary" id="regenerateBtn" title="Generate new password">↻</button>
        </div>
      </div>

      <!-- Strength Indicator -->
      <div class="form-row">
        <label>Strength: <span id="strengthLabel" style="font-weight:700;">—</span></label>
        <div style="width:100%; height:8px; background:var(--border); border-radius:4px; overflow:hidden;">
          <div id="strengthBar" style="height:100%; width:0%; border-radius:4px; transition:all 0.3s ease;"></div>
        </div>
      </div>

      <!-- Length -->
      <div class="form-row">
        <label>Length: <span id="lengthValue" class="range-value">16</span></label>
        <div class="range-row">
          <input type="range" id="lengthSlider" min="4" max="64" value="16">
        </div>
      </div>

      <!-- Character Options -->
      <div class="form-row">
        <label>Character Options</label>
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" id="includeUppercase" checked>
            Uppercase Letters (A-Z)
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="includeLowercase" checked>
            Lowercase Letters (a-z)
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="includeNumbers" checked>
            Numbers (0-9)
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="includeSymbols" checked>
            Symbols (!@#$%^&amp;*...)
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="excludeAmbiguous">
            Exclude ambiguous characters (Il1O0)
          </label>
        </div>
      </div>

      <button class="btn btn-primary" id="generateBtn" style="width:100%;">Generate Password</button>

    </div>
  </main>

  <footer class="footer">
    <p>FreeToolset — All tools run locally in your browser.</p>
  </footer>

  <script>
    (function () {
      // Character sets
      var UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      var LOWER = 'abcdefghijklmnopqrstuvwxyz';
      var NUMBERS = '0123456789';
      var SYMBOLS = '!@#$%^&*()_+-=[]{}|;:,.<>?';
      var AMBIGUOUS = 'Il1O0';

      // DOM elements
      var passwordOutput = document.getElementById('passwordOutput');
      var copyBtn = document.getElementById('copyBtn');
      var regenerateBtn = document.getElementById('regenerateBtn');
      var lengthSlider = document.getElementById('lengthSlider');
      var lengthValue = document.getElementById('lengthValue');
      var includeUpper = document.getElementById('includeUppercase');
      var includeLower = document.getElementById('includeLowercase');
      var includeNumbers = document.getElementById('includeNumbers');
      var includeSymbols = document.getElementById('includeSymbols');
      var excludeAmbiguous = document.getElementById('excludeAmbiguous');
      var generateBtn = document.getElementById('generateBtn');
      var strengthBar = document.getElementById('strengthBar');
      var strengthLabel = document.getElementById('strengthLabel');

      // Cryptographic random integer
      function getRandomInt(max) {
        var array = new Uint32Array(1);
        crypto.getRandomValues(array);
        return array[0] % max;
      }

      // Generate password
      function generate() {
        var charset = '';
        var required = [];

        var upper = UPPER;
        var lower = LOWER;
        var numbers = NUMBERS;

        // Remove ambiguous characters if option is selected
        if (excludeAmbiguous.checked) {
          upper = upper.split('').filter(function (c) { return AMBIGUOUS.indexOf(c) === -1; }).join('');
          lower = lower.split('').filter(function (c) { return AMBIGUOUS.indexOf(c) === -1; }).join('');
          numbers = numbers.split('').filter(function (c) { return AMBIGUOUS.indexOf(c) === -1; }).join('');
        }

        if (includeUpper.checked) {
          charset += upper;
          required.push(upper);
        }
        if (includeLower.checked) {
          charset += lower;
          required.push(lower);
        }
        if (includeNumbers.checked) {
          charset += numbers;
          required.push(NUMBERS); // Numbers have no ambiguous chars to remove except 0 and 1
          if (excludeAmbiguous.checked) {
            required[required.length - 1] = '23456789';
          }
        }
        if (includeSymbols.checked) {
          charset += SYMBOLS;
          required.push(SYMBOLS);
        }

        if (!charset) {
          alert('Please select at least one character type.');
          return;
        }

        var length = parseInt(lengthSlider.value);
        var password = '';

        // Ensure at least one character from each selected type
        for (var i = 0; i < required.length && i < length; i++) {
          password += required[i][getRandomInt(required[i].length)];
        }

        // Fill the rest randomly
        for (var j = password.length; j < length; j++) {
          password += charset[getRandomInt(charset.length)];
        }

        // Shuffle the password
        var arr = password.split('');
        for (var k = arr.length - 1; k > 0; k--) {
          var r = getRandomInt(k + 1);
          var temp = arr[k];
          arr[k] = arr[r];
          arr[r] = temp;
        }

        passwordOutput.value = arr.join('');
        updateStrength(arr.join(''));
      }

      // Calculate password strength
      function updateStrength(password) {
        var score = 0;

        // Length scoring
        if (password.length >= 8) score += 1;
        if (password.length >= 16) score += 1;
        if (password.length >= 24) score += 1;

        // Variety scoring
        if (/[a-z]/.test(password)) score += 1;
        if (/[A-Z]/.test(password)) score += 1;
        if (/[0-9]/.test(password)) score += 1;
        if (/[^a-zA-Z0-9]/.test(password)) score += 1;

        // Map score to percentage and color
        var percent = Math.min((score / 7) * 100, 100);
        strengthBar.style.width = percent + '%';

        if (score <= 2) {
          strengthBar.style.background = '#ef4444';
          strengthLabel.textContent = 'Weak';
          strengthLabel.style.color = '#ef4444';
        } else if (score <= 4) {
          strengthBar.style.background = '#f59e0b';
          strengthLabel.textContent = 'Fair';
          strengthLabel.style.color = '#f59e0b';
        } else if (score <= 5) {
          strengthBar.style.background = '#3b82f6';
          strengthLabel.textContent = 'Good';
          strengthLabel.style.color = '#3b82f6';
        } else {
          strengthBar.style.background = '#22c55e';
          strengthLabel.textContent = 'Strong';
          strengthLabel.style.color = '#22c55e';
        }
      }

      // Event listeners
      lengthSlider.addEventListener('input', function () {
        lengthValue.textContent = this.value;
        generate();
      });

      generateBtn.addEventListener('click', generate);
      regenerateBtn.addEventListener('click', generate);

      [includeUpper, includeLower, includeNumbers, includeSymbols, excludeAmbiguous].forEach(function (cb) {
        cb.addEventListener('change', generate);
      });

      copyBtn.addEventListener('click', function () {
        if (!passwordOutput.value) return;
        passwordOutput.select();
        document.execCommand('copy');
        copyBtn.textContent = '✓ Copied!';
        setTimeout(function () {
          copyBtn.textContent = 'Copy';
        }, 1500);
      });

      // Generate initial password
      generate();
    })();
  </script>

</body>
</html>
